version: '3.9'

services:
  mongodb:
    image: mongo:8
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  taskmanager-api:
    build:
      context: ./TaskManager.Api
    container_name: taskmanager-api
    ports:
      - "5022:5022"
    depends_on:
      - mongodb

volumes:
  mongo-data: